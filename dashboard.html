<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcoBúzios — Painel de Alunos</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --orange:      #C87830;
      --orange-light:#E8944A;
      --orange-dim:  #7A4A1A;
      --teal:        #1E6B70;
      --teal-light:  #2A8E95;
      --teal-dim:    #0D3A3D;
      --bg:          #0B1A1B;
      --surface:     #112224;
      --surface2:    #172E30;
      --border:      #1E3E40;
      --text:        #E8F0F0;
      --muted:       #7A9E9F;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, var(--teal-dim) 0%, #0B1A1B 60%);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      height: 92px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(8px);
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo-wrap img {
      height: 72px;
      filter: brightness(1.3);
      mix-blend-mode: screen;
      border-radius: 10px;
    }

    .logo-divider {
      width: 1px;
      height: 32px;
      background: var(--border);
    }

    .logo-label {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 500;
      line-height: 1.4;
    }
    .logo-label strong {
      display: block;
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 700;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(30,107,112,.25);
      color: #5ECDD3;
      border: 1px solid rgba(30,107,112,.6);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.74rem;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .badge::before {
      content: '';
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #5ECDD3;
      animation: blink 2s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    .timestamp { font-size: 0.75rem; color: var(--muted); }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      header {
        padding: 0 16px;
        height: auto;
        min-height: 60px;
        flex-wrap: wrap;
        gap: 8px;
        padding-top: 10px;
        padding-bottom: 10px;
      }
      .logo-wrap img { height: 38px; }
      .logo-divider, .logo-label, .timestamp, .badge { display: none; }
      .print-btn { padding: 5px 12px; font-size: 0.74rem; }
      .filter-bar { padding: 10px 16px; flex-wrap: wrap; gap: 8px; }
      main { padding: 20px 12px 40px; }
      .kpis { grid-template-columns: 1fr 1fr; gap: 10px; }
      .charts { grid-template-columns: 1fr; }
      .kpi .value { font-size: 2rem; }
    }


    /* ── MAIN ── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 36px 24px 48px;
    }

    /* ── KPIs ── */
    .kpis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .kpi {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px 20px;
      position: relative;
      overflow: hidden;
      transition: transform .2s, box-shadow .2s;
    }
    .kpi:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(0,0,0,.3);
    }
    .kpi::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 3px;
      background: var(--accent, var(--teal));
    }
    .kpi::after {
      content: '';
      position: absolute;
      top: -30px; right: -30px;
      width: 100px; height: 100px;
      border-radius: 50%;
      background: var(--accent, var(--teal));
      opacity: .06;
    }
    .kpi .icon { font-size: 1.5rem; margin-bottom: 14px; display: block; }
    .kpi .label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .kpi .value {
      font-size: 2.6rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1;
      letter-spacing: -1px;
    }
    .kpi .sub { font-size: 0.78rem; color: var(--muted); margin-top: 6px; }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--orange);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* ── CHARTS GRID ── */
    .charts {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      transition: box-shadow .2s;
    }
    .card:hover { box-shadow: 0 8px 28px rgba(0,0,0,.25); }

    .card h2 {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card h2 span { font-size: 1rem; }

    .chart-wrap {
      position: relative;
      height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── BAR LIST ── */
    .bar-list { display: flex; flex-direction: column; gap: 12px; }
    .bar-item { display: flex; flex-direction: column; gap: 5px; }
    .bar-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: #CBD5D5;
    }
    .bar-count { font-size: 0.78rem; color: var(--muted); font-weight: 600; }
    .bar-track {
      background: var(--teal-dim);
      border-radius: 6px;
      height: 9px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 6px;
      transition: width 1s cubic-bezier(.4,0,.2,1);
    }

    /* ── LOADING ── */
    #loading { text-align: center; padding: 100px 0; color: var(--muted); }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FILTER BAR ── */
    .filter-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 40px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .filter-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-right: 4px;
    }
    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .18s;
      font-family: inherit;
    }
    .filter-btn:hover {
      border-color: var(--teal-light);
      color: var(--text);
    }
    .filter-btn.active {
      background: var(--teal);
      border-color: var(--teal);
      color: #fff;
      font-weight: 600;
    }

    /* ── PRINT BUTTON ── */
    .print-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background .18s;
    }
    .print-btn:hover { background: var(--orange-light); }

    /* imagem substituta do gráfico — visível só em print */
    .chart-img { display: none; width: 100%; height: auto; }

    /* ── PRINT STYLES ── */
    @media print {
      @page { size: A4 portrait; margin: 15mm 12mm; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      body { background: #fff !important; color: #111 !important; }
      header {
        background: #0D3A3D !important;
        position: static !important;
        padding: 12px 20px !important;
        border-radius: 8px;
        margin-bottom: 12px;
      }
      .filter-bar, .print-btn, .badge, .timestamp { display: none !important; }
      .logo-label strong { color: #fff !important; }
      .logo-label { color: #ccc !important; }
      main { padding: 0 !important; }
      .kpis {
        display: grid !important;
        grid-template-columns: repeat(4, 1fr) !important;
        gap: 8px !important;
        margin-bottom: 16px !important;
      }
      .kpi {
        display: block !important;
        background: #eef4f4 !important;
        border: 1px solid #b0cece !important;
        border-radius: 8px !important;
        padding: 12px !important;
        overflow: visible !important;
        break-inside: avoid;
      }
      .kpi::before, .kpi::after { display: none !important; }
      .kpi .icon { display: block !important; color: #333 !important; margin-bottom: 8px !important; }
      .kpi .label { color: #555 !important; }
      .kpi .value { font-size: 1.8rem !important; color: #111 !important; }
      .kpi .sub { color: #666 !important; }
      .section-label { color: #C87830 !important; border-color: #ddd !important; }
      .charts {
        display: grid !important;
        grid-template-columns: repeat(2, 1fr) !important;
        gap: 12px !important;
      }
      .card {
        background: #f9fafb !important;
        border: 1px solid #ddd !important;
        border-radius: 8px !important;
        padding: 14px !important;
        break-inside: avoid;
      }
      .card h2 { color: #555 !important; }
      /* esconde canvas, mostra imagem */
      canvas { display: none !important; }
      .chart-img { display: block !important; }
      .chart-wrap { height: auto !important; }
      .bar-track { background: #e0ecec !important; }
      .bar-count { color: #444 !important; }
      .bar-header { color: #222 !important; }
      footer { color: #999 !important; font-size: 0.65rem !important; padding: 8px !important; }
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 0.73rem;
      color: #1E3E40;
    }

    /* ── PRINT PREVIEW MODAL ── */
    #preview-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,.75);
      backdrop-filter: blur(4px);
      flex-direction: column;
    }
    #preview-modal.open { display: flex; }

    #preview-bar {
      background: #0D3A3D;
      border-bottom: 1px solid #1E3E40;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    #preview-bar span {
      font-size: 0.85rem;
      color: #7A9E9F;
      font-weight: 500;
      flex: 1;
    }
    .preview-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: none;
      border-radius: 20px;
      padding: 8px 18px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity .18s;
    }
    .preview-btn:hover { opacity: .85; }
    .preview-btn-print { background: #C87830; color: #fff; }
    .preview-btn-pdf   { background: #1E6B70; color: #fff; }
    .preview-btn-close { background: #1E3E40; color: #7A9E9F; }

    #preview-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 32px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .preview-page {
      background: #fff;
      color: #111;
      width: 210mm;
      min-height: 297mm;
      padding: 15mm 12mm;
      box-shadow: 0 8px 40px rgba(0,0,0,.5);
      border-radius: 4px;
      font-family: 'Inter', sans-serif;
      box-sizing: border-box;
    }

    /* estilos internos do preview (equivalente ao @media print) */
    .preview-page .preview-header {
      background: #0D3A3D;
      border-radius: 8px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }
    .preview-page .preview-header img { height: 48px; border-radius: 6px; }
    .preview-page .preview-header strong { color: #fff; font-size: 0.95rem; display: block; }
    .preview-page .preview-header small { color: #ccc; font-size: 0.78rem; }
    .preview-page .p-section {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #C87830;
      border-bottom: 1px solid #ddd;
      padding-bottom: 6px;
      margin-bottom: 12px;
    }
    .preview-page .p-kpis {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }
    .preview-page .p-kpi {
      background: #eef4f4;
      border: 1px solid #b0cece;
      border-radius: 8px;
      padding: 10px 12px;
    }
    .preview-page .p-kpi .p-icon { font-size: 1.1rem; margin-bottom: 6px; display: block; }
    .preview-page .p-kpi .p-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: .6px; color: #666; font-weight: 600; margin-bottom: 4px; }
    .preview-page .p-kpi .p-value { font-size: 1.5rem; font-weight: 800; color: #111; line-height: 1; }
    .preview-page .p-kpi .p-sub { font-size: 0.68rem; color: #777; margin-top: 4px; }
    .preview-page .p-charts {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .preview-page .p-card {
      background: #f9fafb;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
    }
    .preview-page .p-card h3 { font-size: 0.65rem; text-transform: uppercase; letter-spacing: .6px; color: #666; margin-bottom: 10px; font-weight: 700; }
    .preview-page .p-card img { width: 100%; height: auto; display: block; }
    .preview-page .p-bar-item { margin-bottom: 8px; }
    .preview-page .p-bar-header { display: flex; justify-content: space-between; font-size: 0.74rem; color: #333; margin-bottom: 3px; }
    .preview-page .p-bar-track { background: #e0ecec; border-radius: 4px; height: 7px; overflow: hidden; }
    .preview-page .p-bar-fill { height: 100%; border-radius: 4px; }
    .preview-page .p-footer { text-align: center; font-size: 0.62rem; color: #999; margin-top: 20px; padding-top: 12px; border-top: 1px solid #eee; }
  </style>
</head>
<body>

<!-- ── MODAL DE PRÉ-VISUALIZAÇÃO ── -->
<div id="preview-modal">
  <div id="preview-bar">
    <span>Pré-visualização de impressão</span>
    <button class="preview-btn preview-btn-print" onclick="doPrint()">🖨️ Imprimir</button>
    <button class="preview-btn preview-btn-pdf"   onclick="doPrint()">📄 Baixar PDF</button>
    <button class="preview-btn preview-btn-close" onclick="closePreview()">✕ Fechar</button>
  </div>
  <div id="preview-scroll">
    <div class="preview-page" id="preview-page"></div>
  </div>
</div>

<header>
  <div class="logo-wrap">
    <img src="logo%20EcoBuzios.png" alt="EcoBúzios" />
    <div class="logo-divider"></div>
    <div class="logo-label">
      <strong>Painel de Alunos</strong>
      Dados em tempo real
    </div>
  </div>
  <div class="header-right">
    <button class="print-btn" onclick="printDashboard()">🖨️ Imprimir / PDF</button>
    <span class="badge" id="status-badge">Carregando…</span>
    <span class="timestamp" id="timestamp"></span>
  </div>
</header>

<div class="filter-bar" id="filter-bar">
  <span class="filter-label">Projeto:</span>
  <button class="filter-btn active" data-id="">Todos</button>
</div>

<main>
  <div id="loading">
    <div class="spinner"></div>
    Buscando dados da API…
  </div>

  <div id="content" style="display:none;">
    <div class="section-label">Indicadores principais</div>
    <div class="kpis" id="kpis"></div>

    <div class="section-label" style="margin-top:32px;">Análises detalhadas</div>
    <div class="charts" id="charts"></div>
  </div>
</main>

<footer>EcoBúzios &mdash; Fonte: public-stats-api &mdash; Atualizado a cada carregamento</footer>

<script>
const API_BASE  = 'https://ixgujnhdjrgoakqzdkgx.supabase.co/functions/v1/public-stats-api';
const API_KEY   = 'c04248b422b59e718e8115a66286b1f9a56f5f447b44354128ad7406ebb50752';
const ORANGE      = '#C87830';
const ORANGE_LITE = '#E8944A';
const TEAL        = '#1E6B70';
const TEAL_LITE   = '#2A8E95';
const PALETTE     = ['#C87830','#1E6B70','#E8944A','#2A8E95','#A05A20','#0D3A3D','#F0A860','#5ECDD3','#7A4A1A','#3AACB4','#D4A060','#144C50'];

let activeProjectId = '';
let chartInstances  = [];

function makeChartImg(canvas) {
  const existing = canvas.parentNode.querySelector('.chart-img');
  if (existing) existing.remove();
  const img = document.createElement('img');
  img.className = 'chart-img';
  img.src = canvas.toDataURL('image/png');
  canvas.parentNode.appendChild(img);
}

const LOGOS = {
  '':                                         'logo%20EcoBuzios.png',
  '2dc4ea41-e0f4-4084-bb64-2b414bf72cbc':    'logo%20EcoBuzios.png',
  '1608708a-969d-418a-be08-5c61154046c3':    'logo%20CircoLo.jpg',
  '1274b28c-5772-448e-95af-547b841cb187':    'logo%20EcoBuzios.png',
};

// Mapeia nomes do banco para nomes limpos exibidos na interface
const PROJECT_NAMES = {
  '1274b28c-5772-448e-95af-547b841cb187': 'CircoLo Social',
  '04bef2d1-42e5-4a24-81db-926253db7f1a': 'Tenis de Mesa',
  '1608708a-969d-418a-be08-5c61154046c3': 'CircoLo Centro',
};
function cleanProjectName(name) {
  const found = Object.values(PROJECT_NAMES).find(n => name.includes(n.split(' ')[0]));
  return found || name.replace(' (migração)', '').replace(' (2025-2026)', '').replace(' - Centro', '');
}

function fmtDate(iso) {
  return new Date(iso).toLocaleString('pt-BR', { dateStyle:'medium', timeStyle:'short' });
}
function pct(v, total) { return total ? Math.round(v / total * 100) : 0; }

Chart.defaults.color = '#7A9E9F';

// Lista de projetos com IDs reais do banco
function renderProjectButtons(projetos) {
  const bar = document.getElementById('filter-bar');
  // Remove botões anteriores (exceto "Todos")
  bar.querySelectorAll('.filter-btn:not([data-id=""])').forEach(b => b.remove());
  projetos.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.id = p.id;
    btn.textContent = p.name;
    bar.appendChild(btn);
  });
  bindFilterButtons();
}

function bindFilterButtons() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeProjectId = btn.dataset.id;
      document.querySelector('.logo-wrap img').src = LOGOS[activeProjectId] || LOGOS[''];
      reloadData();
    });
  });
}
bindFilterButtons();

function destroyCharts() {
  chartInstances.forEach(c => c.destroy());
  chartInstances = [];
}

function showLoading() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('content').style.display = 'none';
}

function reloadData() {
  destroyCharts();
  showLoading();
  const url = activeProjectId ? `${API_BASE}?projetos=${activeProjectId}` : API_BASE;
  loadData(url);
}

async function loadData(url = API_BASE) {
  const res   = await fetch(url, { headers: { 'x-api-key': API_KEY } });
  const d     = await res.json();
  const total = d.total_alunos_em_turmas;

  const badge = document.getElementById('status-badge');
  badge.textContent = d.ok ? 'API Online' : 'Erro';
  document.getElementById('timestamp').textContent = 'Gerado em ' + fmtDate(d.gerado_em);

  // Renderiza botões de projeto dinamicamente a cada carga (reflete projetos ativos do banco)
  if (d.projetos_lista) {
    renderProjectButtons(d.projetos_lista);
  }

  const pctPub   = pct((d.instituicao.find(i=>i.name==='Pública')||{value:0}).value, total);
  const totalAulasPuras = d.frequencia?.total_aulas_ano ?? 0;
  const totalReunioes = d.reunioes?.total ?? 0;
  const totalHorasReunioes = d.reunioes?.total_horas ?? 0;
  const totalAulas = totalAulasPuras + totalReunioes;
  const totalHoras = totalAulas * 2;
  const kpiData = [
    { icon:'🎓', label:'Total de Alunos',  value: total,                sub:'em turmas ativas',         accent: TEAL },
    { icon:'📚', label:'Aulas no Ano',     value: `${totalHoras}h <span style="font-size:1rem;opacity:.6;font-weight:500">/ ${totalAulas} aulas</span>`, sub:`horas realizadas em ${d.frequencia?.ano ?? ''}`,  accent: ORANGE },
    { icon:'📍', label:'Bairros',          value: d.bairros.length,     sub:'regiões atendidas',        accent: TEAL_LITE },
    { icon:'🏫', label:'Escola Pública',   value: pctPub+'%',           sub:'dos alunos matriculados',  accent: ORANGE_LITE },
    { icon:'🤝', label:'Reuniões',         value: `${totalHorasReunioes}h <span style="font-size:1rem;opacity:.6;font-weight:500">/ ${totalReunioes} reuniões</span>`, sub:'horas de reunião registradas', accent: TEAL },
  ];

  document.getElementById('kpis').innerHTML = kpiData.map(k => `
    <div class="kpi" style="--accent:${k.accent}">
      <span class="icon">${k.icon}</span>
      <div class="label">${k.label}</div>
      <div class="value">${k.value}</div>
      <div class="sub">${k.sub}</div>
    </div>`).join('');

  const c = document.getElementById('charts');
  c.innerHTML = `
    <div class="card">
      <h2><span>📊</span> Alunos por Projeto</h2>
      <div class="chart-wrap"><canvas id="cProjeto"></canvas></div>
    </div>
    <div class="card">
      <h2><span>🏫</span> Tipo de Instituição</h2>
      <div class="chart-wrap"><canvas id="cInst"></canvas></div>
    </div>
    <div class="card">
      <h2><span>📅</span> Faixa Etária</h2>
      <div class="chart-wrap"><canvas id="cIdade"></canvas></div>
    </div>
    <div class="card">
      <h2><span>📍</span> Distribuição por Bairro</h2>
      <div class="bar-list" id="bairroList"></div>
    </div>`;

  const doughnut = (id, labels, values, colors) => {
    const canvas = document.getElementById(id);
    const ch = new Chart(canvas, {
      type: 'doughnut',
      data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 2, borderColor: '#112224', hoverOffset: 10 }] },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '68%',
        plugins: {
          legend: { position:'right', labels:{ color:'#9ABCBC', font:{size:12}, boxWidth:13, padding:12 } },
          tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.parsed} (${pct(ctx.parsed,total)}%)` } }
        },
        animation: { onComplete: () => makeChartImg(canvas) }
      }
    });
    chartInstances.push(ch);
    return ch;
  };

  doughnut('cProjeto', d.por_projeto.map(p=>cleanProjectName(p.name)), d.por_projeto.map(p=>p.value), [ORANGE, TEAL]);
  doughnut('cInst',    d.instituicao.map(i=>i.name),  d.instituicao.map(i=>i.value), [TEAL, ORANGE, ORANGE_LITE]);

  const order  = ['Até 10','11 – 14','15 – 17','18 – 24','25 – 35','36+'];
  const sorted = order.map(n => d.idades.find(i=>i.name===n)||{name:n,value:0});

  const idadeCanvas = document.getElementById('cIdade');
  const idadeChart = new Chart(idadeCanvas, {
    type: 'bar',
    data: {
      labels: sorted.map(i=>i.name),
      datasets: [{ label:'Alunos', data: sorted.map(i=>i.value),
        backgroundColor: [ORANGE,'#1E6B70','#E8944A','#2A8E95','#A05A20','#3AACB4'],
        borderRadius: 8, borderSkipped: false }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display:false },
        tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.y} aluno${ctx.parsed.y!==1?'s':''}` } }
      },
      scales: {
        x: { ticks:{ color:'#7A9E9F' }, grid:{ color:'#112224' } },
        y: { ticks:{ color:'#7A9E9F', precision:0 }, grid:{ color:'#1E3E40' }, beginAtZero:true }
      },
      animation: { onComplete: () => makeChartImg(idadeCanvas) }
    }
  });
  chartInstances.push(idadeChart);

  const bairros = [...d.bairros].sort((a,b)=>b.value-a.value);
  const max     = bairros[0].value;
  document.getElementById('bairroList').innerHTML = bairros.map((b,i) => `
    <div class="bar-item">
      <div class="bar-header">
        <span>${b.name}</span>
        <span class="bar-count">${b.value} aluno${b.value!==1?'s':''}</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${Math.round(b.value/max*100)}%;background:${PALETTE[i%PALETTE.length]}"></div>
      </div>
    </div>`).join('');

  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
}

loadData().catch(err => {
  document.getElementById('loading').innerHTML = `<p style="color:#C87830">Erro ao carregar: ${err.message}</p>`;
});

// Auto-atualização silenciosa a cada 5 segundos
setInterval(async () => {
  try {
    const url = activeProjectId ? `${API_BASE}?projetos=${activeProjectId}` : API_BASE;
    const res  = await fetch(url, { headers: { 'x-api-key': API_KEY } });
    const d    = await res.json();
    if (!d.ok) return;

    const total     = d.total_alunos_em_turmas;
    const pctPub    = pct((d.instituicao.find(i=>i.name==='Pública')||{value:0}).value, total);
    const totalAulasPuras = d.frequencia?.total_aulas_ano ?? 0;
    const totalReunioes   = d.reunioes?.total ?? 0;
    const totalAulas      = totalAulasPuras + totalReunioes;
    const totalHoras      = totalAulas * 2;

    const totalHorasReunioes = d.reunioes?.total_horas ?? 0;

    // Atualiza todos os valores dos cards
    const values = document.querySelectorAll('#kpis .value');
    if (values[0]) values[0].innerHTML = total;
    if (values[1]) values[1].innerHTML = `${totalHoras}h <span style="font-size:1rem;opacity:.6;font-weight:500">/ ${totalAulas} aulas</span>`;
    if (values[2]) values[2].innerHTML = d.bairros.length;
    if (values[3]) values[3].innerHTML = pctPub + '%';
    if (values[4]) values[4].innerHTML = `${totalHorasReunioes}h <span style="font-size:1rem;opacity:.6;font-weight:500">/ ${totalReunioes} reuniões</span>`;

    document.getElementById('timestamp').textContent = 'Gerado em ' + fmtDate(d.gerado_em);
  } catch (_) {}
}, 5000);

// ── PRÉ-VISUALIZAÇÃO ──
function printDashboard() {
  const page = document.getElementById('preview-page');

  // Captura imagens dos canvas
  const chartImgs = {};
  document.querySelectorAll('canvas').forEach(c => {
    chartImgs[c.id] = c.toDataURL('image/png');
  });

  // Lê os KPIs do DOM
  const kpiEls = document.querySelectorAll('#kpis .kpi');
  const kpisHtml = [...kpiEls].map(k => `
    <div class="p-kpi">
      <span class="p-icon">${k.querySelector('.icon')?.textContent || ''}</span>
      <div class="p-label">${k.querySelector('.label')?.textContent || ''}</div>
      <div class="p-value">${k.querySelector('.value')?.innerHTML || ''}</div>
      <div class="p-sub">${k.querySelector('.sub')?.textContent || ''}</div>
    </div>`).join('');

  // Bairros
  const bairroEls = document.querySelectorAll('#bairroList .bar-item');
  const bairrosHtml = [...bairroEls].map(b => {
    const fill = b.querySelector('.bar-fill');
    return `
    <div class="p-bar-item">
      <div class="p-bar-header">
        <span>${b.querySelector('.bar-header span')?.textContent || ''}</span>
        <span>${b.querySelector('.bar-count')?.textContent || ''}</span>
      </div>
      <div class="p-bar-track">
        <div class="p-bar-fill" style="width:${fill?.style.width || '0%'};background:${fill?.style.background || '#C87830'}"></div>
      </div>
    </div>`;
  }).join('');

  const logoSrc = document.querySelector('.logo-wrap img')?.src || '';
  const timestamp = document.getElementById('timestamp')?.textContent || '';

  page.innerHTML = `
    <div class="preview-header">
      <img src="${logoSrc}" alt="Logo" />
      <div>
        <strong>Painel de Alunos</strong>
        <small>Dados em tempo real · ${timestamp}</small>
      </div>
    </div>

    <div class="p-section">Indicadores principais</div>
    <div class="p-kpis">${kpisHtml}</div>

    <div class="p-section">Análises detalhadas</div>
    <div class="p-charts">
      <div class="p-card"><h3>📊 Alunos por Projeto</h3>${chartImgs.cProjeto ? `<img src="${chartImgs.cProjeto}">` : ''}</div>
      <div class="p-card"><h3>🏫 Tipo de Instituição</h3>${chartImgs.cInst ? `<img src="${chartImgs.cInst}">` : ''}</div>
      <div class="p-card"><h3>📅 Faixa Etária</h3>${chartImgs.cIdade ? `<img src="${chartImgs.cIdade}">` : ''}</div>
      <div class="p-card"><h3>📍 Distribuição por Bairro</h3>${bairrosHtml}</div>
    </div>

    <div class="p-footer">EcoBúzios — Fonte: public-stats-api</div>
  `;

  document.getElementById('preview-modal').classList.add('open');
}

function closePreview() {
  document.getElementById('preview-modal').classList.remove('open');
}
